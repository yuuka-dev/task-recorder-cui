name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    runs-on: ubuntu-latest

    # PyPI の trusted publisher 側で environment=pypi を指定して登録すること．
    # 参考: https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/p/task-recorder-cui

    permissions:
      id-token: write  # OIDC トークン発行 (trusted publishing に必須)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches pyproject version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          PROJ=$(python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          INIT=$(python -c 'import re;print(re.search(r"__version__\s*=\s*\"([^\"]+)\"",open("src/task_recorder_cui/__init__.py").read()).group(1))')
          echo "tag=$TAG pyproject=$PROJ init=$INIT"
          if [ "$TAG" != "$PROJ" ] || [ "$TAG" != "$INIT" ]; then
            echo "::error::tag / pyproject / __init__ の version が一致しません"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Upload to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
